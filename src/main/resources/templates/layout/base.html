<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title layout:title-pattern="$CONTENT_TITLE — bzBuzz">bzBuzz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>

<nav class="navbar">
    <div class="navbar-inner">
        <a th:href="@{/}" class="navbar-logo">bzBuzz</a>

        <div class="navbar-actions">
            <div class="search-container">
            <form th:action="@{/search}" method="get" class="navbar-search">
                <label for="search-input" class="hidden">Search</label>
                <input id="search-input" aria-label="Search bzBuzz" type="text" name="q" placeholder="Search bzBuzz..."
                       th:value="${param.q}"
                       class="search-input"/>
                <button type="submit" class="btn btn-primary btn-sm">Search</button>
            </form>
            </div>
            <div sec:authorize="isAuthenticated()">
                <span class="navbar-username"
                      sec:authentication="name">
                </span>

                <form th:action="@{/logout}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-ghost btn-sm">Log out</button>
                </form>
            </div>
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="btn btn-ghost btn-sm">Log in</a>
                <a th:href="@{/register}" class="btn btn-primary btn-sm">Register</a>
            </div>
        </div>
    </div>
</nav>

<main class="main-content">
    <div layout:fragment="content"></div>
</main>

<footer class="footer">
    <p>bzBuzz — built with Spring Boot</p>
</footer>

</body>
</html>
