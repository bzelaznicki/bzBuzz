<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="'b/' + ${board.name}">Board</title>
</head>
<body>
<div layout:fragment="content">

    <div class="board-header">
        <div class="board-header-info">
            <h1 class="board-title" th:text="'b/' + ${board.name}"></h1>
            <p class="board-description"
               th:text="${board.description} ?: 'No description'"
               th:classappend="${board.description == null} ? 'muted' : ''">
            </p>
            <div class="board-meta">
                <span th:text="${board.memberCount} + ' members'"></span>
                <span class="meta-divider">·</span>
                <span th:text="${board.createdBy != null ? 'Created by ' + board.createdBy.username : 'Created by [deleted user]'}"></span>
                <span class="meta-divider">·</span>
                <span th:text="'Since ' + ${#temporals.format(board.createdAt, 'MMM d, yyyy')}"></span>
                <span th:if="${board.private}" class="badge badge-private">Private</span>
            </div>
        </div>

        <div class="board-header-actions" sec:authorize="isAuthenticated()">
            <form th:if="${!isMember}" th:action="@{/b/{name}/join(name=${board.name})}" method="post">
                <button type="submit" class="btn btn-primary btn-sm">Join</button>
            </form>
            <form th:if="${isMember}" th:action="@{/b/{name}/leave(name=${board.name})}" method="post">
                <button type="submit" class="btn btn-ghost btn-sm">Leave</button>
            </form>
            <a th:if="${isMember}"
               th:href="@{/b/{name}/submit(name=${board.name})}"
               class="btn btn-primary btn-sm">
                New post
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">
        <p th:text="${successMessage}"></p>
    </div>

    <div th:if="${errorMessage}" class="alert alert-error">
        <p th:text="${errorMessage}"></p>
    </div>

    <div class="board-content">
        <div class="posts">
            <div class="sort-tabs">
                <a th:href="@{/b/{name}(name=${board.name}, sort='TOP', page=0)}"
                   th:classappend="${currentSort.name() == 'TOP'} ? ' active' : ''"
                   class="sort-tab">Top</a>
                <a th:href="@{/b/{name}(name=${board.name}, sort='NEW', page=0)}"
                   th:classappend="${currentSort.name() == 'NEW'} ? ' active' : ''"
                   class="sort-tab">New</a>
                <a th:href="@{/b/{name}(name=${board.name}, sort='UPDATED', page=0)}"
                   th:classappend="${currentSort.name() == 'UPDATED'} ? ' active' : ''"
                   class="sort-tab">Updated</a>
            </div>
            <div th:if="${posts.content.empty}" class="empty-state">
                <p>No posts yet.</p>
                <a sec:authorize="isAuthenticated()"
                   th:if="${isMember}"
                   th:href="@{/b/{name}/submit(name=${board.name})}"
                   class="btn btn-primary btn-sm">
                    Create the first post
                </a>
            </div>

            <div th:unless="${posts.content.empty}" class="post-list">
                <div th:each="post : ${posts.content}" class="post-card">

                    <div th:replace="~{fragments/post-vote :: voteButtons(${post}, ${board.name}, ${userVotes})}"></div>

                    <div class="post-content">
                        <div class="post-meta">
                            <span class="post-type-badge"
                                  th:text="${post.postType}"
                                  th:classappend="${post.postType.name() == 'URL'} ? ' badge-url' : ' badge-text'">
                            </span>
                            <span class="post-author"
                                  th:text="${post.creator != null ? 'u/' + post.creator.username : '[deleted]'}">
                            </span>
                            <span class="meta-divider">·</span>
                            <span class="post-date"
                                  th:text="${#temporals.format(post.createdAt, 'MMM d, yyyy')}">
                            </span>
                            <span class="meta-divider">·</span>
                            <a class="post-comment-count"
                               th:href="@{/b/{name}/posts/{slug}(name=${board.name},slug=${post.slug})}"
                               th:text="${commentCounts[post.id] ?: 0} + ' comments'">
                            </a>
                        </div>

                        <a class="post-title"
                           th:href="@{/b/{name}/posts/{slug}(name=${board.name},slug=${post.slug})}"
                           th:text="${post.title}">
                        </a>

                        <div th:if="${post.postType.name() == 'URL'}" class="post-url">
                            <a th:if="${post.url != null and (post.url.startsWith('https://') or post.url.startsWith('http://'))}"
                               th:href="${post.url}"
                               th:text="${post.url}"
                               target="_blank"
                               rel="noopener noreferrer">
                            </a>
                        </div>
                    </div>

                </div>
            </div>

            <div class="pagination" th:if="${totalPages > 1}">
                <a th:if="${currentPage > 0}"
                   th:href="@{/b/{name}(name=${board.name}, page=${currentPage - 1}, sort=${currentSort})}"
                   class="btn btn-ghost btn-sm">← Previous</a>

                <span class="pagination-info"
                      th:text="${currentPage + 1} + ' / ' + ${totalPages}">
                </span>

                <a th:if="${currentPage + 1 < totalPages}"
                   th:href="@{/b/{name}(name=${board.name}, page=${currentPage + 1}, sort=${currentSort})}"
                   class="btn btn-ghost btn-sm">Next →</a>
            </div>

        </div>
    </div>

</div>
</body>
</html>
